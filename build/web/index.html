<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%90%A0%3C/text%3E%3C/svg%3E">
  <title>水族守卫</title>
  <style>
    html, body, #canvas {
      margin: 0;
      padding: 0;
      border: 0;
      width: 100%;
      height: 100%;
    }

    html, body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: #062536;
      color: #e6f7ff;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #canvas {
      display: block;
      outline: none;
      width: 100vw;
      height: 100dvh;
    }

    #status {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: radial-gradient(circle at center, #0b6f8f, #062536);
    }

    #status-title {
      font-size: 30px;
      font-weight: 700;
    }

    #status-progress {
      width: 280px;
    }

    #status-notice {
      max-width: 720px;
      padding: 16px 20px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.38);
      line-height: 1.6;
      text-align: center;
      display: none;
    }

    #build-version {
      position: fixed;
      right: 8px;
      bottom: 6px;
      z-index: 20;
      color: rgba(230, 247, 255, 0.72);
      font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas">你的浏览器不支持 Canvas。</canvas>
  <div id="status">
    <div id="status-title">水族守卫</div>
    <progress id="status-progress"></progress>
    <div id="status-notice"></div>
  </div>
  <div id="build-version">build 20260712.1</div>
  <script src="godot.js"></script>
  <script>
    window.addEventListener("contextmenu", (event) => event.preventDefault());
    window.addEventListener("touchmove", (event) => event.preventDefault(), { passive: false });

    const GODOT_CONFIG = {
      args: [],
      canvasResizePolicy: 2,
      executable: "godot",
      mainPack: "godot.pck?v=20260712.1",
      experimentalVK: false,
      fileSizes: {},
      focusCanvas: true,
      gdextensionLibs: [],
      serviceWorker: "",
      unloadAfterInit: true,
    };

    const status = document.getElementById("status");
    const progress = document.getElementById("status-progress");
    const notice = document.getElementById("status-notice");
    const engine = new Engine(GODOT_CONFIG);
    const missing = Engine.getMissingFeatures({ threads: false });

    function showError(error) {
      console.error(error);
      progress.style.display = "none";
      notice.style.display = "block";
      notice.textContent = error instanceof Error ? error.message : String(error);
    }

    if (missing.length > 0) {
      showError("浏览器缺少运行 Godot Web 所需能力：\n" + missing.join("\n"));
    } else {
      engine.startGame({
        onProgress(current, total) {
          if (current > 0 && total > 0) {
            progress.value = current;
            progress.max = total;
          } else {
            progress.removeAttribute("value");
            progress.removeAttribute("max");
          }
        },
      }).then(() => {
        status.remove();
      }).catch(showError);
    }
  </script>
</body>
</html>
